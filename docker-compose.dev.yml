services:
  frontend:
    image: node:20-alpine
    container_name: react-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm start"
    ports:
      - "8080:3000"
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
    networks:
      - devops-network

networks:
  devops-network: