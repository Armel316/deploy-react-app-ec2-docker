name: CI - Dev

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --watchAll=false

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME_LC=ghcr.io/${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME_LC }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME_LC }}:dev \
            .

      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Push image
        run: |
          docker push ${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME_LC }}:dev