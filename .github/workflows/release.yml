name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:

  # --------------------
  # 1️⃣ TEST
  # --------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test -- --watchAll=false

  # --------------------
  # 2️⃣ VERSION
  # --------------------
  version:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get last tag
        id: tag
        run: |
          git fetch --tags
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "last=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Increment patch
        id: bump
        run: |
          VERSION=${{ steps.tag.outputs.last }}
          VERSION=${VERSION#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag v${{ steps.bump.outputs.version }}
          git push origin v${{ steps.bump.outputs.version }}

  # ---------------------
  # 3️⃣ BUILD + SCAN + PUSH
  # ---------------------
  build-and-push:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lower case image name
        run: |
          echo "IMAGE_NAME_LC=ghcr.io/${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          # Utilisation de la version du job 'version' et du nom en minuscules
          VERSION=${{ needs.version.outputs.version }}
          
          docker build \
            -t ${{ env.IMAGE_NAME_LC }}:$VERSION \
            -t ${{ env.IMAGE_NAME_LC }}:latest \
            .

      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME_LC }}:${{ needs.version.outputs.version }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Push image
        run: |
          VERSION=${{ needs.version.outputs.version }}
          docker push ${{ env.IMAGE_NAME_LC }}:$VERSION
          docker push ${{ env.IMAGE_NAME_LC }}:latest